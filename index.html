<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>동적 거미줄과 장력 · Verlet Spider-Web Simulator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a14;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    canvas#stage {
      position: fixed; inset: 0;
      display: block;
      cursor: default;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    .panel {
      background: rgba(10, 10, 25, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      color: #e0e0e0;
      z-index: 10;
      user-select: none;
    }

    .hud {
      position: fixed; top: 12px; right: 12px;
      width: 248px;
      padding: 14px 16px 12px;
      font-size: 13px;
    }
    .hud h3 {
      margin: 0 0 12px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .hud h3 .badge { font-size: 10px; color: #888; font-weight: normal; }

    .hud .row {
      display: flex; align-items: center;
      margin: 8px 0;
      gap: 8px;
    }
    .hud label {
      flex: 0 0 60px;
      font-size: 12px;
      color: #c0c0c0;
    }
    .hud input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      height: 18px;
      outline: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
    }
    .hud input[type=range]::-webkit-slider-runnable-track {
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
    }
    .hud input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #fff;
      margin-top: -4px;
      cursor: pointer;
    }
    .hud input[type=range]::-moz-range-track {
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
    }
    .hud input[type=range]::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      border: none;
    }
    .hud .val {
      flex: 0 0 36px;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      text-align: right;
      color: #fff;
    }

    .hud .state-row {
      display: flex; align-items: center; justify-content: space-between;
      margin: 10px 0 6px;
      font-size: 12px;
      color: #c0c0c0;
    }
    .hud .wind-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .hud .wind-dot.on { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.6); }
    .hud .wind-dot.off { background: #555; }

    .hud .buttons {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .hud button {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: #e0e0e0;
      padding: 7px 10px;
      border-radius: 5px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s;
    }
    .hud button:hover { background: rgba(255,255,255,0.13); }
    .hud button:active { background: rgba(255,255,255,0.2); transform: translateY(1px); }

    .stats {
      position: fixed; top: 12px; left: 12px;
      padding: 10px 14px;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      color: #aaa;
      line-height: 1.6;
    }
    .stats .num { color: #fff; font-weight: 600; }
    .stats .head { color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .stats .row { display: flex; justify-content: space-between; gap: 12px; }

    .instructions {
      position: fixed; bottom: 14px; left: 14px;
      padding: 12px 16px;
      font-size: 12px;
      line-height: 1.6;
      max-width: 400px;
      color: #c0c0c0;
    }
    .instructions strong {
      display: block;
      color: #fff;
      font-size: 12px;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .instructions .key {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 1px 6px;
      border-radius: 4px;
      font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      font-size: 11px;
      margin: 0 2px;
    }
    .instructions ul { list-style: none; }
    .instructions li { margin: 2px 0; }
    .instructions li::before { content: "•"; color: #888; margin-right: 6px; }

    .loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #0a0a14;
      color: #888;
      font-size: 13px;
      letter-spacing: 0.5px;
      z-index: 100;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .loading.hidden { opacity: 0; }
  </style>
</head>
<body>
  <canvas id="stage" aria-label="거미줄 시뮬레이션 캔버스"></canvas>

  <div class="stats panel" id="stats">
    <div class="head">Verlet 시뮬레이터</div>
    <div class="row"><span>점</span><span class="num" id="stat-points">0</span></div>
    <div class="row"><span>줄</span><span class="num" id="stat-cons">0</span></div>
    <div class="row"><span>절단</span><span class="num" id="stat-broken">0</span></div>
    <div class="row"><span>FPS</span><span class="num" id="stat-fps">0</span></div>
  </div>

  <div class="hud panel">
    <h3>
      <span>제어판</span>
      <span class="badge">Verlet</span>
    </h3>

    <div class="row">
      <label for="wind-slider">바람 세기</label>
      <input id="wind-slider" type="range" min="0" max="2.5" step="0.05" value="0.8" />
      <span class="val" id="wind-val">0.80</span>
    </div>

    <div class="row">
      <label for="grav-slider">중력</label>
      <input id="grav-slider" type="range" min="0" max="2" step="0.05" value="1.0" />
      <span class="val" id="grav-val">1.00</span>
    </div>

    <div class="row">
      <label for="thresh-slider">줄 강도</label>
      <input id="thresh-slider" type="range" min="0.2" max="1.5" step="0.05" value="0.55" />
      <span class="val" id="thresh-val">0.55</span>
    </div>

    <div class="row">
      <label for="count-slider">거미줄 개수</label>
      <input id="count-slider" type="range" min="1" max="6" step="1" value="3" />
      <span class="val" id="count-val">3</span>
    </div>

    <div class="state-row">
      <span><span class="wind-dot on" id="wind-dot"></span>바람</span>
      <small style="color:#888" id="mode-label">대기 중</small>
    </div>

    <div class="buttons">
      <button id="reset-btn" type="button">초기화</button>
      <button id="clear-btn" type="button">모두 지우기</button>
    </div>
  </div>

  <div class="instructions panel" data-instructions>
    <strong>사용법</strong>
    <ul>
      <li><strong>벽 근처</strong>에서 <strong>드래그</strong>해 거미줄을 그리세요</li>
      <li><strong>줄 위</strong>를 <strong>드래그</strong>해 당기면 장력이 표시됩니다</li>
      <li>한계 초과 시 <strong>'팅!'</strong> 하고 끊어집니다</li>
    </ul>
    <div style="margin-top:8px;color:#888">
      <span class="key">Space</span> 바람 ·
      <span class="key">R</span> 리셋 ·
      <span class="key">+</span><span class="key">−</span> 바람 세기
    </div>
  </div>

  <div class="loading" id="loading">Verlet 시뮬레이터 초기화 중…</div>

  <script>
  'use strict';
  (function () {

    // ============================================================
    // Configuration
    // ============================================================
    const CONFIG = {
      damping: 0.99,
      substeps: 2,
      iterations: 2,
      constraintStiffness: 0.5,  // < 1 allows springy web (wind sway visible)
      snapDistance: 28,
      anchorStep: 32,
      grabRadius: 12,
      drawStep: 18,
      particlePool: 200,
      particleSpawn: 12,
      breakThrottleMs: 120,
      maxAudioBeepsPerSecond: 8,

      defaultWind: 0.8,
      defaultGravity: 1.0,
      defaultThreshold: 0.55,
      defaultWebCount: 3,
      maxWebCount: 6,
      minWebCount: 1,
    };

    // ============================================================
    // DOM refs
    // ============================================================
    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d', { alpha: false });
    const elWind = document.getElementById('wind-slider');
    const elWindVal = document.getElementById('wind-val');
    const elGrav = document.getElementById('grav-slider');
    const elGravVal = document.getElementById('grav-val');
    const elThresh = document.getElementById('thresh-slider');
    const elThreshVal = document.getElementById('thresh-val');
    const elCount = document.getElementById('count-slider');
    const elCountVal = document.getElementById('count-val');
    const elWindDot = document.getElementById('wind-dot');
    const elReset = document.getElementById('reset-btn');
    const elClear = document.getElementById('clear-btn');
    const elMode = document.getElementById('mode-label');
    const elStatPoints = document.getElementById('stat-points');
    const elStatCons = document.getElementById('stat-cons');
    const elStatBroken = document.getElementById('stat-broken');
    const elStatFps = document.getElementById('stat-fps');
    const elLoading = document.getElementById('loading');

    // ============================================================
    // State
    // ============================================================
    const state = {
      mode: 'idle',                       // 'idle' | 'drawing' | 'pulling'
      windEnabled: true,
      windStrength: CONFIG.defaultWind,
      windFactor: 1.0,                    // 1 when enabled, 0.05 when disabled
      gravity: CONFIG.defaultGravity,
      breakThreshold: CONFIG.defaultThreshold,
      webCount: CONFIG.defaultWebCount,

      grabbedPointId: null,
      pullOffsetX: 0,
      pullOffsetY: 0,

      t: 0,
      running: true,
      viewW: 0,
      viewH: 0,
      dpr: 1,
      nextPointId: 1,
      nextConstraintId: 1,
      brokenCount: 0,
      lastBreakMs: 0,
      recentBreakCount: 0,
      recentBreakWindowStart: 0,
      lastMouseX: 0,
      lastMouseY: 0,
      prevMouseX: 0,
      prevMouseY: 0,
    };

    const points = [];
    const constraints = [];
    const particles = [];
    const anchors = new Set();           // ids of pinned points
    let previewPath = [];

    // AudioContext (lazy)
    let audioCtx = null;
    let audioUnlocked = false;

    // FPS tracking
    let fpsFrames = 0;
    let fpsLastTime = performance.now();
    let fps = 0;

    // ============================================================
    // Audio
    // ============================================================
    function ensureAudio() {
      if (audioCtx) return audioCtx;
      const Ctor = window.AudioContext || window.webkitAudioContext;
      if (!Ctor) return null;
      try {
        audioCtx = new Ctor();
      } catch (_) {
        audioCtx = null;
      }
      return audioCtx;
    }

    function unlockAudio() {
      if (audioUnlocked) return;
      const ac = ensureAudio();
      if (!ac) return;
      audioUnlocked = true;
      if (ac.state === 'suspended') {
        ac.resume().catch(() => { audioUnlocked = false; });
      }
    }

    function playTing(stress) {
      // Throttle: enforce max beeps/sec
      const now = performance.now();
      if (now - state.recentBreakWindowStart >= 1000) {
        state.recentBreakWindowStart = now;
        state.recentBreakCount = 0;
      }
      if (state.recentBreakCount >= CONFIG.maxAudioBeepsPerSecond) return;
      state.recentBreakCount++;

      const ac = ensureAudio();
      if (!ac) return;
      if (ac.state === 'suspended') {
        ac.resume().catch(() => {});
      }
      const t0 = ac.currentTime;

      // Pitch climbs with strain
      const pitchMul = 1 + Math.max(0, Math.min(2, stress)) * 1.5;
      const f1 = 2400 * pitchMul;
      const f2 = 7200 * pitchMul;

      const g = ac.createGain();
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.linearRampToValueAtTime(0.45, t0 + 0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.45);

      const o1 = ac.createOscillator();
      o1.type = 'sine';
      o1.frequency.setValueAtTime(f1, t0);
      o1.frequency.exponentialRampToValueAtTime(f1 * 0.5, t0 + 0.15);

      const o2 = ac.createOscillator();
      o2.type = 'sine';
      o2.frequency.setValueAtTime(f2, t0);
      o2.frequency.exponentialRampToValueAtTime(f2 * 0.5, t0 + 0.2);

      o1.connect(g);
      o2.connect(g);
      g.connect(ac.destination);

      o1.start(t0);
      o2.start(t0);
      o1.stop(t0 + 0.5);
      o2.stop(t0 + 0.5);
    }

    // ============================================================
    // Wall snapping
    // ============================================================
    function snapToGrid(v, step) {
      return Math.round(v / step) * step;
    }

    function snapToWall(x, y) {
      const w = state.viewW, h = state.viewH;
      const sd = CONFIG.snapDistance;
      const step = CONFIG.anchorStep;
      if (x <= sd)                       return { x: 0, y: snapToGrid(Math.max(0, Math.min(h, y)), step), side: 'left' };
      if (x >= w - sd)                   return { x: w, y: snapToGrid(Math.max(0, Math.min(h, y)), step), side: 'right' };
      if (y <= sd)                       return { x: snapToGrid(Math.max(0, Math.min(w, x)), step), y: 0, side: 'top' };
      if (y >= h - sd)                   return { x: snapToGrid(Math.max(0, Math.min(w, x)), step), y: h, side: 'bottom' };
      return null;
    }

    function nearWall(x, y) {
      const w = state.viewW, h = state.viewH;
      return x <= CONFIG.snapDistance
          || x >= w - CONFIG.snapDistance
          || y <= CONFIG.snapDistance
          || y >= h - CONFIG.snapDistance;
    }

    // ============================================================
    // Point / Constraint management
    // ============================================================
    function addPoint(x, y, pinned) {
      const id = state.nextPointId++;
      const p = {
        id,
        x, y,
        px: x, py: y,
        pinned: !!pinned,
        phase: Math.random() * Math.PI * 2,
        mass: 1,
      };
      points.push(p);
      if (pinned) anchors.add(id);
      return id;
    }

    function addConstraint(aId, bId) {
      const a = points.find(p => p.id === aId);
      const b = points.find(p => p.id === bId);
      if (!a || !b) return null;
      const id = state.nextConstraintId++;
      const restLen = Math.hypot(b.x - a.x, b.y - a.y);
      if (restLen < 1e-3) return null;
      constraints.push({
        id,
        a: aId,
        b: bId,
        restLen,
        alive: true,
        stress: 0,
      });
      return id;
    }

    function clearAll() {
      points.length = 0;
      constraints.length = 0;
      particles.length = 0;
      anchors.clear();
      previewPath = [];
      state.grabbedPointId = null;
      state.mode = 'idle';
      state.brokenCount = 0;
      state.nextPointId = 1;
      state.nextConstraintId = 1;
      setModeLabel('대기 중');
      canvas.style.cursor = 'default';
    }

    // ============================================================
    // Physics — Verlet integration + distance constraint relaxation
    // ============================================================
    function step() {
      state.t++;
      state.frames = (state.frames || 0) + 1;

      const t = state.t;
      const wind = state.windStrength;
      const wf = state.windFactor;
      const grav = state.gravity;
      const damp = CONFIG.damping;
      const grabbedId = state.grabbedPointId;

      // Substep loop: integrate + relax at each substep so external forces
      // (wind, gravity) accumulate with the relaxation feedback.
      for (let s = 0; s < CONFIG.substeps; s++) {
        // Integration (Verlet) for this substep
        const ts = t + s * 0.5;  // staggered time for substeps
        for (let i = 0; i < points.length; i++) {
          const p = points[i];
          if (p.pinned) continue;
          if (p.id === grabbedId) continue;

          const base = Math.sin(ts * 0.012 + p.phase) * 0.6 * wind;
          const gust = Math.sin(ts * 0.0033) * Math.sin(ts * 0.0077 + 1.3) * 0.4 * wind;
          // Scale wind 3x for visible sway (the per-point phase randomization already
          // gives natural variation; pure sin would average to 0)
          const ax = (base + gust) * wf * 3.0;
          const ay = grav / CONFIG.substeps;

          const vx = (p.x - p.px) * damp;
          const vy = (p.y - p.py) * damp;

          p.px = p.x;
          p.py = p.y;

          p.x += vx + ax / CONFIG.substeps;
          p.y += vy + ay;

          if (!isFinite(p.x) || !isFinite(p.y)) {
            p.x = p.px;
            p.y = p.py;
          }
        }

        // Relaxation
        for (let it = 0; it < CONFIG.iterations; it++) {
          relaxAndCheck();
        }
      }

      // Particles
      updateParticles();
    }

    function relaxAndCheck() {
      const grabbedId = state.grabbedPointId;
      const thresh = state.breakThreshold;

      for (let i = 0; i < constraints.length; i++) {
        const c = constraints[i];
        if (!c.alive) continue;

        const a = points.find(p => p.id === c.a);
        const b = points.find(p => p.id === c.b);
        if (!a || !b) continue;

        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 1e-6) continue;

        // Stress
        const stretch = Math.abs(dist - c.restLen) / c.restLen;
        c.stress = stretch;

        // Break check (use first-pass stretch so a sudden yank registers)
        if (stretch > thresh && !c.noRelax) {
          breakConstraint(c, a, b, stretch);
          continue;
        }

        // Skip projection if explicitly frozen (test hook)
        if (c.noRelax) continue;

        // Projection (with stiffness < 1 for springy feel that allows wind sway)
        const w1 = (a.pinned || a.id === grabbedId) ? 0 : 1 / a.mass;
        const w2 = (b.pinned || b.id === grabbedId) ? 0 : 1 / b.mass;
        const total = w1 + w2;
        if (total === 0) continue;

        const diff = (dist - c.restLen) / dist;
        const stiffness = CONFIG.constraintStiffness;
        const ox = dx * diff * stiffness;
        const oy = dy * diff * stiffness;
        a.x += ox * (w1 / total);
        a.y += oy * (w1 / total);
        b.x -= ox * (w2 / total);
        b.y -= oy * (w2 / total);
      }
    }

    function breakConstraint(c, a, b, stress) {
      c.alive = false;
      c.brokenAt = state.t;
      state.brokenCount++;

      const mx = (a.x + b.x) / 2;
      const my = (a.y + b.y) / 2;
      spawnParticles(mx, my, stressToColor(stress));
      playTing(stress);
    }

    // ============================================================
    // Particles
    // ============================================================
    function spawnParticles(x, y, color) {
      const count = CONFIG.particleSpawn;
      for (let i = 0; i < count; i++) {
        if (particles.length >= CONFIG.particlePool) break;
        const angle = Math.random() * Math.PI * 2;
        const speed = 0.8 + Math.random() * 2.2;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 1.0,
          life: 1,
          decay: 0.012 + Math.random() * 0.01,
          color,
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.18 * state.gravity;       // small gravity for fall feel
        p.vx *= 0.94;
        p.vy *= 0.94;
        p.life -= p.decay;
        if (p.life <= 0 || p.y > state.viewH + 200) {
          particles.splice(i, 1);
        }
      }
    }

    // ============================================================
    // Tension color (green → yellow → red)
    // ============================================================
    function stressToColor(stress) {
      const s = Math.max(0, Math.min(1, stress));
      let h, sat;
      if (s < 0.15) {
        const t = s / 0.15;
        h = 120 + (55 - 120) * t;
        sat = 80 + (90 - 80) * t;
      } else if (s < 0.35) {
        const t = (s - 0.15) / 0.20;
        h = 55 + (10 - 55) * t;
        sat = 90;
      } else {
        const t = Math.min(1, (s - 0.35) / 0.30);
        h = 10 - 5 * t;
        sat = 90;
      }
      return 'hsl(' + h.toFixed(1) + ', ' + sat.toFixed(1) + '%, 55%)';
    }

    // ============================================================
    // Rendering
    // ============================================================
    function render() {
      const w = state.viewW, h = state.viewH;

      ctx.fillStyle = '#0a0a14';
      ctx.fillRect(0, 0, w, h);

      drawWallGrid(w, h);
      drawPreview();
      drawConstraints();
      drawParticles();
      drawPoints();
    }

    function drawWallGrid(w, h) {
      ctx.strokeStyle = 'rgba(255,255,255,0.035)';
      ctx.lineWidth = 1;
      const step = 64;
      ctx.beginPath();
      for (let x = step; x < w; x += step) {
        ctx.moveTo(x + 0.5, 0);
        ctx.lineTo(x + 0.5, h);
      }
      for (let y = step; y < h; y += step) {
        ctx.moveTo(0, y + 0.5);
        ctx.lineTo(w, y + 0.5);
      }
      ctx.stroke();
    }

    function drawConstraints() {
      ctx.lineCap = 'round';
      for (let i = 0; i < constraints.length; i++) {
        const c = constraints[i];
        if (!c.alive) continue;
        const a = points.find(p => p.id === c.a);
        const b = points.find(p => p.id === c.b);
        if (!a || !b) continue;

        ctx.strokeStyle = stressToColor(c.stress);
        ctx.lineWidth = 1.4 + Math.min(1, c.stress) * 1.4;

        // Slight alpha modulation for atmospheric depth
        const alpha = 0.85;
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    function drawPoints() {
      // Free points — small dots
      for (let i = 0; i < points.length; i++) {
        const p = points[i];
        if (p.pinned) continue;
        ctx.fillStyle = 'rgba(220,220,220,0.85)';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.8, 0, Math.PI * 2);
        ctx.fill();
      }

      // Anchor glows + cores
      for (const id of anchors) {
        const p = points.find(p => p.id === id);
        if (!p) continue;

        // Soft halo
        const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 14);
        g.addColorStop(0, 'rgba(255,255,255,0.4)');
        g.addColorStop(0.5, 'rgba(255,255,255,0.12)');
        g.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 14, 0, Math.PI * 2);
        ctx.fill();

        // Core
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
      }

      // Grabbed point outline
      if (state.grabbedPointId != null) {
        const p = points[state.grabbedPointId];
        if (p) {
          ctx.strokeStyle = '#ffaa44';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
          ctx.stroke();
        }
      }
    }

    function drawPreview() {
      if (previewPath.length < 2) return;
      ctx.strokeStyle = 'rgba(255,255,255,0.55)';
      ctx.lineWidth = 1.4;
      ctx.setLineDash([4, 6]);
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(previewPath[0].x, previewPath[0].y);
      for (let i = 1; i < previewPath.length; i++) {
        ctx.lineTo(previewPath[i].x, previewPath[i].y);
      }
      ctx.stroke();
      ctx.setLineDash([]);

      // Path points
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      for (let i = 0; i < previewPath.length; i++) {
        const p = previewPath[i];
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      // Anchor hints at endpoints
      const sp = previewPath[0];
      const ep = previewPath[previewPath.length - 1];
      ctx.fillStyle = 'rgba(74,222,128,0.7)';
      if (nearWall(sp.x, sp.y)) { ctx.beginPath(); ctx.arc(sp.x, sp.y, 5, 0, Math.PI * 2); ctx.fill(); }
      ctx.fillStyle = 'rgba(74,222,128,0.7)';
      if (nearWall(ep.x, ep.y)) { ctx.beginPath(); ctx.arc(ep.x, ep.y, 5, 0, Math.PI * 2); ctx.fill(); }
    }

    function drawParticles() {
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2.4, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // ============================================================
    // Mouse interaction
    // ============================================================
    function distToSegment(px, py, x1, y1, x2, y2) {
      const dx = x2 - x1, dy = y2 - y1;
      const lenSq = dx * dx + dy * dy;
      if (lenSq === 0) return Math.hypot(px - x1, py - y1);
      let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
      t = Math.max(0, Math.min(1, t));
      const cx = x1 + t * dx;
      const cy = y1 + t * dy;
      return Math.hypot(px - cx, py - cy);
    }

    function findConstraintNear(x, y) {
      let bestDist = Infinity;
      let bestC = null;
      for (let i = 0; i < constraints.length; i++) {
        const c = constraints[i];
        if (!c.alive) continue;
        const a = points.find(p => p.id === c.a);
        const b = points.find(p => p.id === c.b);
        if (!a || !b) continue;
        const d = distToSegment(x, y, a.x, a.y, b.x, b.y);
        if (d < CONFIG.grabRadius && d < bestDist) {
          bestDist = d;
          bestC = c;
        }
      }
      return bestC;
    }

    function getMousePos(e) {
      const rect = canvas.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function setModeLabel(text) {
      if (elMode) elMode.textContent = text;
    }

    function onMouseDown(e) {
      if (e.button === 2) return; // ignore right click
      const { x, y } = getMousePos(e);

      unlockAudio();
      state.prevMouseX = e.clientX;
      state.prevMouseY = e.clientY;
      state.lastMouseX = e.clientX;
      state.lastMouseY = e.clientY;

      const snap = snapToWall(x, y);
      if (snap && e.button === 0) {
        // Begin drawing
        state.mode = 'drawing';
        previewPath = [{ x: snap.x, y: snap.y }];
        canvas.style.cursor = 'crosshair';
        setModeLabel('그리는 중…');
        return;
      }

      if (e.button === 0) {
        // Try to grab a constraint endpoint
        const c = findConstraintNear(x, y);
        if (c) {
          const a = points.find(p => p.id === c.a);
          const b = points.find(p => p.id === c.b);
          const distA = Math.hypot(a.x - x, a.y - y);
          const distB = Math.hypot(b.x - x, b.y - y);
          const target = distA < distB ? a : b;

          state.mode = 'pulling';
          state.grabbedPointId = target.id;
          state.pullOffsetX = e.clientX - target.x;
          state.pullOffsetY = e.clientY - target.y;
          canvas.style.cursor = 'grabbing';
          setModeLabel('당기는 중…');
        }
      }
    }

    function onMouseMove(e) {
      const { x, y } = getMousePos(e);

      state.prevMouseX = state.lastMouseX;
      state.prevMouseY = state.lastMouseY;
      state.lastMouseX = e.clientX;
      state.lastMouseY = e.clientY;

      if (state.mode === 'drawing') {
        const last = previewPath[previewPath.length - 1];
        const d = Math.hypot(x - last.x, y - last.y);
        if (d >= CONFIG.drawStep) {
          previewPath.push({ x, y });
        }
        canvas.style.cursor = 'crosshair';
      } else if (state.mode === 'pulling' && state.grabbedPointId != null) {
        const p = points[state.grabbedPointId];
        if (p) {
          // Carry mouse delta as implicit velocity (recoil feel)
          const mx = (e.clientX - state.prevMouseX) * 0.6;
          const my = (e.clientY - state.prevMouseY) * 0.6;
          p.x = e.clientX - state.pullOffsetX;
          p.y = e.clientY - state.pullOffsetY;
          p.px = p.x - mx;
          p.py = p.y - my;
        }
        canvas.style.cursor = 'grabbing';
      } else {
        // IDLE hover
        const snap = snapToWall(x, y);
        if (snap) {
          canvas.style.cursor = 'crosshair';
        } else if (findConstraintNear(x, y)) {
          canvas.style.cursor = 'grab';
        } else {
          canvas.style.cursor = 'default';
        }
      }
    }

    function onMouseUp() {
      if (state.mode === 'drawing') {
        commitDrawing();
      } else if (state.mode === 'pulling') {
        state.mode = 'idle';
        state.grabbedPointId = null;
        setModeLabel('대기 중');
      }
      canvas.style.cursor = 'default';
    }

    function onMouseLeaveWindow() {
      // Soft: if drawing, abort preview
      if (state.mode === 'drawing') {
        previewPath = [];
        state.mode = 'idle';
        setModeLabel('대기 중');
        canvas.style.cursor = 'default';
      }
    }

    function commitDrawing() {
      if (previewPath.length < 2) {
        previewPath = [];
        state.mode = 'idle';
        setModeLabel('대기 중');
        canvas.style.cursor = 'default';
        return;
      }
      const startSnap = snapToWall(previewPath[0].x, previewPath[0].y);
      const endSnap = snapToWall(previewPath[previewPath.length - 1].x, previewPath[previewPath.length - 1].y);
      const ids = [];

      const s = previewPath[0];
      const sx = startSnap ? startSnap.x : s.x;
      const sy = startSnap ? startSnap.y : s.y;
      ids.push(addPoint(sx, sy, !!startSnap));

      for (let i = 1; i < previewPath.length - 1; i++) {
        ids.push(addPoint(previewPath[i].x, previewPath[i].y, false));
      }

      const e = previewPath[previewPath.length - 1];
      const ex = endSnap ? endSnap.x : e.x;
      const ey = endSnap ? endSnap.y : e.y;
      ids.push(addPoint(ex, ey, !!endSnap));

      for (let i = 0; i < ids.length - 1; i++) {
        addConstraint(ids[i], ids[i + 1]);
      }

      previewPath = [];
      state.mode = 'idle';
      canvas.style.cursor = 'default';
      setModeLabel('대기 중');
    }

    // ============================================================
    // Demo seed
    // ============================================================
    function addHorizontalThread(y, nPoints) {
      const N = nPoints || 8;
      const start = snapToWall(8, y);
      const end = snapToWall(state.viewW - 8, y);
      if (!start || !end) return false;
      const seg = (end.x - start.x) / (N - 1);
      const ids = [];
      for (let i = 0; i < N; i++) {
        const x = start.x + i * seg;
        const yp = start.y;
        const pinned = (i === 0 || i === N - 1);
        ids.push(addPoint(x, yp, pinned));
      }
      for (let i = 0; i < ids.length - 1; i++) {
        addConstraint(ids[i], ids[i + 1]);
      }
      return true;
    }

    function addVerticalThread(x, nPoints) {
      const N = nPoints || 7;
      const start = snapToWall(x, 8);
      const end = snapToWall(x, state.viewH - 8);
      if (!start || !end) return false;
      const seg = (end.y - start.y) / (N - 1);
      const ids = [];
      for (let i = 0; i < N; i++) {
        const yp = start.y + i * seg;
        const xp = start.x;
        const pinned = (i === 0 || i === N - 1);
        ids.push(addPoint(xp, yp, pinned));
      }
      for (let i = 0; i < ids.length - 1; i++) {
        addConstraint(ids[i], ids[i + 1]);
      }
      return true;
    }

    function seedDemo() {
      const w = state.viewW, h = state.viewH;
      if (w < 100 || h < 100) return;

      // N = total web count, 1..6
      //   1..3  -> N horizontal threads
      //   4..6  -> 3 horizontal + (N-3) vertical threads
      const N = Math.max(CONFIG.minWebCount,
                Math.min(CONFIG.maxWebCount, state.webCount || CONFIG.defaultWebCount));
      const nHoriz = Math.min(3, N);
      const nVert = Math.max(0, N - 3);

      // Horizontal threads, evenly distributed (h * 0.25, 0.5, 0.75)
      const horizYs = [h * 0.25, h * 0.50, h * 0.75];
      for (let i = 0; i < nHoriz; i++) {
        addHorizontalThread(horizYs[i], 8);
      }

      // Vertical threads at x = 0.25, 0.50, 0.75 of width
      const vertXs = [w * 0.25, w * 0.50, w * 0.75];
      for (let i = 0; i < nVert; i++) {
        addVerticalThread(vertXs[i], 7);
      }
    }

    function reset() {
      clearAll();
      // Re-apply HUD defaults (keep user's current webCount)
      state.windStrength = CONFIG.defaultWind;
      state.gravity = CONFIG.defaultGravity;
      state.breakThreshold = CONFIG.defaultThreshold;
      state.windEnabled = true;
      state.windFactor = 1.0;

      elWind.value = state.windStrength;
      elWindVal.textContent = state.windStrength.toFixed(2);
      elGrav.value = state.gravity;
      elGravVal.textContent = state.gravity.toFixed(2);
      elThresh.value = state.breakThreshold;
      elThreshVal.textContent = state.breakThreshold.toFixed(2);
      elCount.value = state.webCount;
      elCountVal.textContent = String(state.webCount);

      updateWindIndicator();
      seedDemo();
    }

    // ============================================================
    // HUD wiring
    // ============================================================
    function updateWindIndicator() {
      if (!elWindDot) return;
      elWindDot.classList.toggle('on', !!state.windEnabled);
      elWindDot.classList.toggle('off', !state.windEnabled);
    }

    function syncSlider(el, valEl, v) {
      el.value = v;
      valEl.textContent = v.toFixed(2);
    }

    function adjustWind(delta) {
      state.windStrength = Math.max(0, Math.min(2.5, state.windStrength + delta));
      syncSlider(elWind, elWindVal, state.windStrength);
    }

    function bindHUD() {
      elWind.addEventListener('input', () => {
        state.windStrength = parseFloat(elWind.value);
        elWindVal.textContent = state.windStrength.toFixed(2);
      });
      elGrav.addEventListener('input', () => {
        state.gravity = parseFloat(elGrav.value);
        elGravVal.textContent = state.gravity.toFixed(2);
      });
      elThresh.addEventListener('input', () => {
        state.breakThreshold = parseFloat(elThresh.value);
        elThreshVal.textContent = state.breakThreshold.toFixed(2);
      });
      elCount.addEventListener('input', () => {
        const n = parseInt(elCount.value, 10);
        if (n === state.webCount) return;
        state.webCount = n;
        elCountVal.textContent = String(n);
        // Re-seed with the new count
        clearAll();
        seedDemo();
      });
      elReset.addEventListener('click', () => { unlockAudio(); reset(); });
      elClear.addEventListener('click', () => { unlockAudio(); clearAll(); });

      document.addEventListener('keydown', (e) => {
        if (e.target instanceof HTMLInputElement || e.target instanceof HTMLButtonElement) {
          // Allow R / Space to operate while focused on controls too
          if (e.code !== 'Space' && e.key !== 'r' && e.key !== 'R') return;
        }
        if (e.code === 'Space') {
          e.preventDefault();
          state.windEnabled = !state.windEnabled;
          state.windFactor = state.windEnabled ? 1 : 0.05;
          updateWindIndicator();
        } else if (e.key === 'r' || e.key === 'R') {
          reset();
        } else if (e.key === '+' || e.key === '=') {
          adjustWind(+0.1);
        } else if (e.key === '-' || e.key === '_') {
          adjustWind(-0.1);
        }
      });

      document.addEventListener('visibilitychange', () => {
        state.running = !document.hidden;
      });
    }

    // ============================================================
    // Resize
    // ============================================================
    function resize() {
      const dpr = window.devicePixelRatio || 1;
      state.dpr = dpr;
      state.viewW = window.innerWidth;
      state.viewH = window.innerHeight;
      canvas.width = Math.floor(state.viewW * dpr);
      canvas.height = Math.floor(state.viewH * dpr);
      canvas.style.width = state.viewW + 'px';
      canvas.style.height = state.viewH + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      // Clamp existing points softly
      for (let i = 0; i < points.length; i++) {
        const p = points[i];
        if (p.x < -100) p.x = -100;
        if (p.x > state.viewW + 100) p.x = state.viewW + 100;
        if (p.y < -100) p.y = -100;
        if (p.y > state.viewH + 100) p.y = state.viewH + 100;
      }
    }

    // ============================================================
    // Main loop
    // ============================================================
    function loop() {
      if (state.running) {
        step();
        render();
        updateStats();
      }
      requestAnimationFrame(loop);
    }

    function updateStats() {
      fpsFrames++;
      const now = performance.now();
      if (now - fpsLastTime >= 500) {
        fps = Math.round((fpsFrames * 1000) / (now - fpsLastTime));
        fpsFrames = 0;
        fpsLastTime = now;
        if (elStatFps) elStatFps.textContent = String(fps);
      }
      if (elStatPoints) elStatPoints.textContent = String(points.length);
      if (elStatCons) {
        let alive = 0;
        for (let i = 0; i < constraints.length; i++) if (constraints[i].alive) alive++;
        elStatCons.textContent = String(alive);
      }
      if (elStatBroken) elStatBroken.textContent = String(state.brokenCount);
    }

    // ============================================================
    // Expose WebSim
    // ============================================================
    window.WebSim = {
      state,
      points,
      constraints,
      particles,
      anchors,
      getStats: () => {
        let freeN = 0, sumX = 0, sumY = 0;
        for (let i = 0; i < points.length; i++) {
          const p = points[i];
          if (!p.pinned) {
            freeN++;
            sumX += p.x;
            sumY += p.y;
          }
        }
        const avgX = freeN ? sumX / freeN : 0;
        const avgY = freeN ? sumY / freeN : 0;
        let alive = 0;
        for (let i = 0; i < constraints.length; i++) {
          if (constraints[i].alive) alive++;
        }
        return {
          points: points.length,
          freePoints: freeN,
          constraints: alive,
          broken: state.brokenCount,
          avgX, avgY,
        };
      },
      reset,
      clear: clearAll,
      get audio() { return audioCtx; },
      get audioUnlocked() { return audioUnlocked; },
      seedDemo,
      seedFresh: function () {
        clearAll();
        seedDemo();
      },
      _testHooks: {
        forceBreakNearest: function (x, y) {
          let best = null, bestDist = Infinity;
          for (let i = 0; i < constraints.length; i++) {
            const c = constraints[i];
            if (!c.alive) continue;
            const a = points.find(p => p.id === c.a);
            const b = points.find(p => p.id === c.b);
            if (!a || !b) continue;
            const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
            const d = Math.hypot(mx - x, my - y);
            if (d < bestDist) { bestDist = d; best = c; }
          }
          if (best) {
            const a = points.find(p => p.id === best.a);
            const b = points.find(p => p.id === best.b);
            breakConstraint(best, a, b, Math.max(0.7, best.stress || 0.7));
            return { id: best.id };
          }
          return null;
        },
        forceBreakById: function (id) {
          const c = constraints.find(c => c.id === id);
          if (c && c.alive) {
            const a = points.find(p => p.id === c.a);
            const b = points.find(p => p.id === c.b);
            breakConstraint(c, a, b, Math.max(0.7, c.stress || 0.7));
            return { id: c.id };
          }
          return null;
        },
        forceHighStrain: function (factor) {
          // Create a temporary constraint between two wall anchors with
          // restLen = dist / factor, so stress = factor - 1 (red band).
          // Both endpoints are pinned, so the constraint is stationary.
          // noRelax prevents projection from snapping it back.
          const f = Math.max(1.5, factor || 3);
          const anchorList = Array.from(anchors);
          if (anchorList.length < 2) return null;
          // Pick the two anchors that are farthest apart
          let best = null, bestDist = 0;
          for (let i = 0; i < anchorList.length; i++) {
            for (let j = i + 1; j < anchorList.length; j++) {
              const aId = anchorList[i], bId = anchorList[j];
              const a = points.find(p => p.id === aId);
              const b = points.find(p => p.id === bId);
              if (!a || !b) continue;
              const d = Math.hypot(b.x - a.x, b.y - a.y);
              if (d > bestDist) { bestDist = d; best = { aId, bId, a, b }; }
            }
          }
          if (!best || bestDist < 5) return null;
          const cId = addConstraint(best.aId, best.bId);
          if (!cId) return null;
          const c = constraints.find(c => c.id === cId);
          c._testForced = true;
          c.noRelax = true;
          c.restLen = bestDist / f;
          return { id: c.id, factor: f, midpoint: { x: (best.a.x + best.b.x) / 2, y: (best.a.y + best.b.y) / 2 } };
        },
        restoreStrain: function () {
          for (let i = constraints.length - 1; i >= 0; i--) {
            if (constraints[i]._testForced) {
              constraints.splice(i, 1);
            }
          }
        },
        grabPoint: function (id) {
          state.grabbedPointId = id;
          state.mode = 'pulling';
        },
        releasePoint: function () {
          state.grabbedPointId = null;
          state.mode = 'idle';
        },
        setMouseForTest: function (x, y) {
          state.lastMouseX = x;
          state.lastMouseY = y;
          state.prevMouseX = x;
          state.prevMouseY = y;
        },
        updateMouseForTest: function (x, y) {
          state.prevMouseX = state.lastMouseX;
          state.prevMouseY = state.lastMouseY;
          state.lastMouseX = x;
          state.lastMouseY = y;
          if (state.grabbedPointId != null) {
            const p = points[state.grabbedPointId];
            if (p) {
              const dx = (x - state.prevMouseX) * 0.6;
              const dy = (y - state.prevMouseY) * 0.6;
              p.x = x;
              p.y = y;
              p.px = p.x - dx;
              p.py = p.y - dy;
            }
          }
        },
        addSeededDemo: function () { clearAll(); seedDemo(); },
        unlockAudio,
        getAudio: function () { return audioCtx; },
      },
    };

    // ============================================================
    // Boot
    // ============================================================
    function init() {
      resize();
      window.addEventListener('resize', resize);

      canvas.addEventListener('mousedown', onMouseDown);
      canvas.addEventListener('contextmenu', (e) => e.preventDefault());
      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('mouseup', onMouseUp);
      window.addEventListener('blur', onMouseLeaveWindow);
      document.addEventListener('mouseleave', onMouseLeaveWindow);

      bindHUD();
      seedDemo();

      // First-paint done; hide loader
      requestAnimationFrame(() => {
        if (elLoading) elLoading.classList.add('hidden');
        setTimeout(() => { if (elLoading) elLoading.style.display = 'none'; }, 350);
      });

      loop();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>
</body>
</html>
